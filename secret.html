<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zone Secrète - Mini Jeu</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .secret-shell {
        width: min(95vw, 700px);
        margin-inline: auto;
      }

      .secret-card {
        background: linear-gradient(160deg, var(--panel), var(--panel-light));
        border-radius: 24px;
        box-shadow: var(--shadow);
        padding: 1.2rem;
      }

      .secret-card h1 {
        margin-top: 0;
      }

      .arena {
        margin-top: 1rem;
        height: min(55vh, 420px);
        border-radius: 16px;
        position: relative;
        overflow: hidden;
        background: rgba(4, 9, 28, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .target {
        position: absolute;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #ffffff, #ff7c7c);
        box-shadow: 0 0 20px rgba(255, 124, 124, 0.8);
        cursor: pointer;
        transform: translate(-50%, -50%);
      }

      .scoreboard {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .scoreboard p {
        margin: 0.4rem 0;
      }
    </style>
  </head>
  <body>
    <main class="secret-shell">
      <section class="secret-card">
        <h1>🎯 Zone Secrète : Jeu de réflexes</h1>
        <p>Clique sur la cible le plus vite possible pendant 20 secondes.</p>
        <div class="scoreboard">
          <p>Score: <strong id="score">0</strong></p>
          <p>Temps: <strong id="time">20</strong>s</p>
          <p>Meilleur score: <strong id="best">0</strong></p>
        </div>
        <button id="start" class="btn eq">Démarrer</button>
        <div class="arena" id="arena" aria-label="Zone de jeu"></div>
      </section>
    </main>

    <script src="secret.js"></script>
  </body>
</html>
